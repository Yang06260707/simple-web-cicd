name: CI/CD Flask全流程流水线
on:
  push:
    branches: [ main ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # GitHub黑框自动下载安装Docker核心代码
      - name: GitHub云端安装Docker引擎
        run: |
          sudo apt remove docker docker-engine docker.io containerd runc -y
          sudo apt update
          sudo apt install ca-certificates curl gnupg lsb-release -y
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          sudo chmod a+r /etc/apt/keyrings/docker.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt update
          sudo apt install docker-ce docker-ce-cli containerd.io docker-compose-plugin -y
          sudo systemctl start docker
          docker --version

      - name: 1.单元测试
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt
          pytest test_app.py -v

      - name: 2.构建镜像
        run: |
          docker build -t flask-web:v1.0 .
          docker save flask-web:v1.0 -o flask-web.tar

      - name: 3.部署ECS服务器
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT }}
          script: |
            mkdir -p /opt/cicd
            cd /opt/cicd
            cat flask-web.tar | docker load
            docker rm -f flask-app || true
            docker run -d --name flask-app -p 8080:8080 flask-web:v1.0

      - name: 4.部署完成提示
        run: echo "流水线全部执行完毕，服务部署成功"
